server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/librarydb;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

app.jwt.secret=${APP_JWT_SECRET:library-management-secret-key-change-me}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}
app.jwt.refresh-expiration-days=${APP_JWT_REFRESH_EXPIRATION_DAYS:14}
app.payment.base-url=${APP_PAYMENT_BASE_URL:https://payments.library.local}
app.openai.api-key=${APP_OPENAI_API_KEY:}
app.openai.model=${APP_OPENAI_MODEL:gpt-4.1-mini}
app.openai.base-url=${APP_OPENAI_BASE_URL:https://api.openai.com/v1}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,https://*.vercel.app}
app.mock-data.enabled=${APP_MOCK_DATA_ENABLED:true}
app.mock-data.csv-path=${APP_MOCK_DATA_CSV_PATH:}
app.mock-data.classpath-csv=${APP_MOCK_DATA_CLASSPATH_CSV:seed/sample-books.csv}
app.mock-data.max-books=${APP_MOCK_DATA_MAX_BOOKS:1000}
app.mock-data.mock-members=${APP_MOCK_DATA_MOCK_MEMBERS:12}